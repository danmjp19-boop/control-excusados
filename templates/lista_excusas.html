<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Excusas Registradas</title>

<style>

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f4f6f9;
    margin:20px;
}

.contenedor{
    width:100%;
    max-width:1100px;
    margin:auto;
    overflow-x:auto;
}

.volver{
    text-decoration:none;
    color:#0b5ed7;
    font-size:18px;
    font-weight:bold;
    display:inline-block;
    margin-bottom:20px;
}

.volver:hover{
    color:#084298;
}

h2{
    text-align:center;
    color:#0b5ed7;
    margin-bottom:20px;
}

.buscador{
    width:100%;
    padding:12px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:8px;
    margin-bottom:20px;
    box-sizing:border-box;
}

.total{
    margin-bottom:15px;
    font-weight:bold;
    color:#555;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    box-shadow:0 0 10px rgba(0,0,0,.10);
}

th{
    background:#0b5ed7;
    color:white;
    padding:12px;
}

td{
    padding:10px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

tr:hover{
    background:#f2f2f2;
}

</style>

</head>

<body>

<div class="contenedor">

<a href="javascript:history.back()" class="volver">← Regresar</a>

<h2>Listado de Excusas</h2>

<input
type="text"
id="buscar"
class="buscador"
placeholder="🔍 Buscar por nombre o cédula..."
onkeyup="filtrar()">

<div class="total" id="contador">
🔎 Total encontrados: {{ excusas|length }}
</div>

<table id="tabla">

<tr>
<th>ID</th>
<th>Nombre</th>
<th>Cédula</th>
<th>Orden</th>
<th>Inicio</th>
<th>Final</th>
<th>Días</th>
</tr>

{% for e in excusas %}

<tr>

<td>{{ e.id }}</td>
<td>{{ e.nombre }}</td>
<td>{{ e.cedula }}</td>
<td>{{ e.orden }}</td>
<td>{{ e.fecha_inicio }}</td>
<td>{{ e.fecha_final }}</td>
<td>{{ e.dias }}</td>

</tr>

{% endfor %}

</table>

</div>

<script>

function filtrar(){

let input=document.getElementById("buscar");
let filtro=input.value.toUpperCase();
let tabla=document.getElementById("tabla");
let filas=tabla.getElementsByTagName("tr");

let encontrados=0;

for(let i=1;i<filas.length;i++){

let nombre=filas[i].cells[1].textContent.toUpperCase();
let cedula=filas[i].cells[2].textContent.toUpperCase();

if(filtro==""){

filas[i].style.display="";
encontrados++;

}else if(nombre.indexOf(filtro)>-1 || cedula.indexOf(filtro)>-1){

filas[i].style.display="";
encontrados++;

}else{

filas[i].style.display="none";

}

}

document.getElementById("contador").innerHTML="🔎 Total encontrados: "+encontrados;

}

</script>

</body>
</html>
