{% extends "base.html" %}

{% block title %}Usuarios{% endblock %}

{% block content %}

<div style="display:flex;justify-content:space-between;align-items:center;">

    <h1>Gestión de Usuarios</h1>

    <button class="btn-nuevo">
        ➕ Nuevo Usuario
    </button>

</div>

<br>

<div class="card">

    <input
        type="text"
        placeholder="🔍 Buscar usuario..."
        style="width:300px;padding:10px;margin-bottom:20px;">

    <table width="100%" cellspacing="0">

        <thead>
            <tr>
                <th>ID</th>
                <th>Grado</th>
                <th>Nombre</th>
                <th>CAI</th>
                <th>Rol</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody>

            <tr>
                <td>1</td>
                <td>SI</td>
                <td>Administrador</td>
                <td>CAI Andes</td>
                <td>Administrador</td>
                <td>🟢 Activo</td>
                <td>✏️ Editar | 🔒 Desactivar</td>
            </tr>

        </tbody>

    </table>

</div>

{% endblock %}
